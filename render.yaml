services:
  - type: web
    name: upi-reservasi-kunjungan
    env: docker                          # ← pakai Docker, bukan PHP native
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: APP_NAME
        value: "Reservasi Kunjungan UPI"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true              # Render generate otomatis
      - key: APP_LOCALE
        value: id

      # Database — Supabase PostgreSQL
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        sync: false                      # Isi manual dari Supabase
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        value: postgres
      - key: DB_USERNAME
        value: postgres
      - key: DB_PASSWORD
        sync: false                      # Isi manual dari Supabase

      # Cloudinary — file storage
      - key: FILESYSTEM_DISK
        value: cloudinary
      - key: CLOUDINARY_URL
        sync: false                      # Isi manual dari Cloudinary
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false

      # Session & Cache (gunakan cookie/array, aman untuk container ephemeral)
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_STORE
        value: array
      - key: QUEUE_CONNECTION
        value: sync

      # Mail
      - key: MAIL_MAILER
        value: log
      - key: MAIL_FROM_ADDRESS
        value: ninawd27@upi.edu
      - key: MAIL_FROM_NAME
        value: "Reservasi Kunjungan UPI"

      # Admin awal
      - key: ADMIN_EMAIL
        value: ninawd27@upi.edu
      - key: ADMIN_PASSWORD
        sync: false                      # Isi manual, jangan pakai default!
