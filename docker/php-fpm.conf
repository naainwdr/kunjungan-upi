[www]
user = www-data
group = www-data
listen = 127.0.0.1:9000
pm = dynamic
pm.max_children = 5
pm.start_servers = 1
pm.min_spare_servers = 1
pm.max_spare_servers = 2
pm.max_requests = 200

; Log ke stderr agar Koyeb bisa baca
php_admin_value[error_log] = /dev/stderr
php_admin_flag[log_errors] = on
