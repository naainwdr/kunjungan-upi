<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        # Wajib: aktifkan .htaccess untuk Laravel routing
        AllowOverride All
        Options +FollowSymLinks -Indexes
        Require all granted
    </Directory>

    # Log ke stdout agar Render bisa baca
    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined

</VirtualHost>
